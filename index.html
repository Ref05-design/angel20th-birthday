<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Angel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            background: #2d0028;
            color: #fff0f8;
        }

        /* Background Layers */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            z-index: -2;
        }

        .bg-layer.active {
            opacity: 1;
        }

        .bg-1 {
            background: linear-gradient(135deg, #2d0028 0%, #5c0f4a 45%, #ff6bb5 100%);
        }

        .bg-2 {
            background-image: url('https://via.placeholder.com/1920x1080/2d0028/ff80bf?text=Angel'); /* placeholder – replace with actual image */
            filter: brightness(0.7) contrast(1.1);
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: auto;
            height: auto;
            color: rgba(255, 214, 240, 0.95);
            font-size: 1.4rem;
            animation: float 15s infinite ease-in-out;
            filter: drop-shadow(0 0 8px rgba(255, 82, 168, 0.6));
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Vignette Overlay */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(40,0,35,0.55) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* Content Styling */
        .content {
            text-align: center;
            max-width: 600px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .content.fade-out {
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s ease-out;
        }

        h1, h2, p {
            font-weight: 300;
            line-height: 1.8;
            letter-spacing: 0.05em;
        }

        .main-text {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #ffe6f4;
            text-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }

        .sub-text {
            font-size: 1.3rem;
            color: #ff9ed1;
            font-style: italic;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        .question-text {
            font-size: 1.6rem;
            margin-bottom: 2.5rem;
            color: #fff0f8;
        }

        .highlight {
            color: #ff80bf;
            font-weight: 400;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 3rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid rgba(255, 128, 191, 0.7);
            color: #ffc1e3;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 128, 191, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: rgba(255, 128, 191, 0.15);
            border-color: #ff9ed1;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 181, 0.35);
        }

        /* Wrong Answer Screen */
        .wrong-answer {
            background: rgba(0, 0, 0, 0.7);
            padding: 3rem;
            border-radius: 4px;
            border: 1px solid rgba(255, 128, 191, 0.35);
        }

        .wrong-text {
            font-size: 1.4rem;
            color: #ff9ed1;
            margin-bottom: 1rem;
        }

        .retry-text {
            font-size: 1.1rem;
            color: #888;
            font-style: italic;
        }

        /* Final Message */
        .final-message {
            background: rgba(0, 0, 0, 0.5);
            padding: 4rem;
            border: 1px solid rgba(255, 128, 191, 0.4);
            backdrop-filter: blur(10px);
        }

        .birthday-title {
            font-size: 3rem;
            color: #ff8fcc;
            margin-bottom: 2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
        }

        .poem-line {
            font-size: 1.3rem;
            margin: 1rem 0;
            color: #ffe6f4;
            opacity: 0.9;
        }

        .signature {
            margin-top: 3rem;
            font-size: 1.1rem;
            color: #ffb3da;
            font-style: italic;
        }

        /* Music Control */
        .music-control {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .music-control:hover {
            opacity: 1;
        }

        .music-btn {
            background: transparent;
            border: 1px solid rgba(255, 128, 191, 0.7);
            color: #ffc1e3;
            padding: 0.8rem;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .music-btn:hover {
            background: rgba(255, 128, 191, 0.15);
            transform: scale(1.1);
        }

        /* Countdown Timer */
        .countdown {
            position: fixed;
            top: 2rem;
            right: 2rem;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: rgba(255, 182, 219, 0.9);
            opacity: 0;
            transition: opacity 1s;
        }

        .countdown.visible {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .main-text { font-size: 1.4rem; }
            .question-text { font-size: 1.2rem; }
            .birthday-title { font-size: 2rem; }
            .button-group { flex-direction: column; gap: 1rem; }
            .btn { padding: 0.8rem 2rem; }
        }
    </style>
    <base target="_blank">
</head>
<body>
    <!-- Background Layers -->
    <div class="bg-layer bg-1 active" id="bg1"></div>
    <div class="bg-layer bg-2" id="bg2"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Vignette -->
    <div class="vignette"></div>

    <!-- Countdown (optional, can be shown later) -->
    <div class="countdown" id="countdown"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="content visible" id="content">
            <!-- Content injected by JavaScript -->
        </div>
    </div>

    <!-- Music Control -->
    <div class="music-control">
        <button class="music-btn" id="musicToggle" onclick="toggleMusic()">🎵</button>
    </div>

    <!-- Audio Element -->
    <audio id="bgMusic" loop>
        <!-- Replace with your own audio file -->
        <source src="Rod_Wave_-_2018_(Official_Audio)[1].mp3" type="audio/mpeg">
    </audio>

    <script>
        // State Management
        let currentState = 'opening';
        let musicPlaying = false;
        const audio = document.getElementById('bgMusic');

        // Create floating particles (emojis)
        function createParticles() {
            const container = document.getElementById('particles');
            const loveEmojis = ['💖', '💘', '💕', '💗', '💓', '❤️'];
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = loveEmojis[Math.floor(Math.random() * loveEmojis.length)];
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.fontSize = (1 + Math.random() * 1.2) + 'rem';
                container.appendChild(particle);
            }
        }

        // Content Templates
        const screens = {
            opening: {
                html: `
                    <p class="main-text">Before we begin...<br>I need to ask you something.</p>
                    <p class="question-text">Are you <span class="highlight">Angel Maesela</span>...<br>also known as <span class="highlight">Suki</span>?</p>
                    <div class="button-group">
                        <button class="btn" onclick="handleAnswer(true, 'name')">Yes</button>
                        <button class="btn" onclick="handleAnswer(false, 'name')">No</button>
                    </div>
                `
            },
            wrongName: {
                html: `
                    <div class="wrong-answer">
                        <p class="wrong-text">Wrong answer.<br>You're too special to pretend otherwise.</p>
                        <p class="retry-text">Let's try that again...</p>
                    </div>
                `,
                delay: 2000,
                next: 'opening'
            },
            transition: {
                html: `
                    <p class="main-text">The person who sent this<br>knows just how special you are.</p>
                    <p class="sub-text">One more thing...</p>
                    <p class="question-text">Is <span class="highlight">'Moja Mosoko'</span> your first love?</p>
                    <div class="button-group">
                        <button class="btn" onclick="handleAnswer(true, 'love')">Yes</button>
                        <button class="btn" onclick="handleAnswer(false, 'love')">No</button>
                    </div>
                `
            },
            wrongLove: {
                html: `
                    <div class="wrong-answer">
                        <p class="wrong-text">Hmm...<br>I think your heart remembers differently.</p>
                        <p class="retry-text">Let's answer that again...</p>
                    </div>
                `,
                delay: 2000,
                next: 'transition'
            },
            final: {
                html: `
                    <div class="final-message">
                        <p class="birthday-title">Happy Birthday, Angel.</p>
                        <p class="poem-line">Time moves... but some chapters stay written in ink.</p>
                        <p class="poem-line">Some things change.<br>Some memories don't.</p>
                        <p class="poem-line" style="margin-top: 2rem; color: #ff9ed1;">See you soon.</p>
                        <p class="signature">Love,<br>@RM.</p>
                    </div>
                `,
                final: true
            }
        };

        // Transition between screens
        function transitionTo(screenName) {
            const content = document.getElementById('content');
            const screen = screens[screenName];
            if (!screen) return;

            content.classList.add('fade-out');

            setTimeout(() => {
                content.innerHTML = screen.html;
                content.classList.remove('fade-out');
                content.classList.add('visible');

                // Handle auto-transition for wrong answers
                if (screen.delay && screen.next) {
                    setTimeout(() => {
                        transitionTo(screen.next);
                    }, screen.delay);
                }
            }, 500); // match CSS transition duration
        }

        // Handle button answers
        function handleAnswer(isYes, type) {
            if (type === 'name') {
                if (isYes) {
                    transitionTo('transition');
                } else {
                    transitionTo('wrongName');
                }
            } else if (type === 'love') {
                if (isYes) {
                    transitionTo('final');
                } else {
                    transitionTo('wrongLove');
                }
            }
        }

        // Music toggle
        function toggleMusic() {
            if (musicPlaying) {
                audio.pause();
                musicPlaying = false;
                document.getElementById('musicToggle').textContent = '🎵';
            } else {
                audio.play().catch(e => console.log('Autoplay blocked:', e));
                musicPlaying = true;
                document.getElementById('musicToggle').textContent = '⏸️';
            }
        }

        // Initialize page
        window.onload = function() {
            createParticles();
            transitionTo('opening');
            // Optional: switch background after some time
            setTimeout(() => {
                document.getElementById('bg1').classList.remove('active');
                document.getElementById('bg2').classList.add('active');
            }, 5000);
        };
    </script>
</body>
</html>
